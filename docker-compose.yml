version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: disaster-relief-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
    networks:
      - disaster-relief-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: disaster-relief-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - disaster-relief-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: disaster-relief-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"  # For external access (Spring Boot from host)
      - "29092:29092" # For internal Docker network access
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - disaster-relief-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: disaster-relief-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092  # Use internal listener
    networks:
      - disaster-relief-network

volumes:
  mongodb_data:

networks:
  disaster-relief-network:
    driver: bridge